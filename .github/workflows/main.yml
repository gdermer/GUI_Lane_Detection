name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]

# This forces all actions to run on Node 24 and clears the deprecation spam
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.determine-name.outputs.jar_name }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v5

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '26'
        distribution: 'temurin'
        cache: 'maven'

    - name: Grant Execute Permission for Mvnw
      run: |
        if [ -f mvnw ]; then chmod +x mvnw; fi

    - name: Build with Maven
      run: |
        if [ -f mvnw ]; then
          ./mvnw clean package
        else
          mvn clean package
        fi

    - name: Determine Artifact Name
      id: determine-name
      run: |
        JAR_PATH=$(ls target/*.jar | head -n 1)
        JAR_NAME=$(basename $JAR_PATH)
        echo "jar_name=$JAR_NAME" >> $GITHUB_OUTPUT

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v5
      with:
        name: java-app-artifact
        path: target/*.jar

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
    - name: Download Build Artifact
      uses: actions/download-artifact@v5
      with:
        name: java-app-artifact
        path: target

    # Uses the latest v0.1.8 release to natively align with Node updates
    - name: Copy JAR to Server via SSH
      uses: appleboy/scp-action@v0.1.8
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        source: "target/${{ needs.build-and-test.outputs.artifact-name }}"
        target: "/var/www/app"
        strip_components: 1

    # Uses the latest v1.0.3 release to natively align with Node updates
    - name: Restart Application on Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /var/www/app
          PID=$(pgrep -f "${{ needs.build-and-test.outputs.artifact-name }}")
          if [ ! -z "$PID" ]; then
            kill -15 $PID
            sleep 5
          fi
          nohup java -jar ${{ needs.build-and-test.outputs.artifact-name }} > app.log 2>&1 &
