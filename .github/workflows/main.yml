name: Java CI/CD with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up the Java Development Kit (JDK)
    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: 'maven' # Automatically caches your Maven dependencies

    # Step 3: Grant execution permission to the Maven Wrapper (if using mvnw)
    - name: Grant Execute Permission for Mvnw
      run: |
        if [ -f mvnw ]; then chmod +x mvnw; fi

    # Step 4: Compile, run tests, and package the application
    - name: Build with Maven
      run: |
        if [ -f mvnw ]; then
          ./mvnw clean package
        else
          mvn clean package
        fi

    # Step 5: Save the built jar as an artifact
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: java-app-artifact
        path: target/*.jar
